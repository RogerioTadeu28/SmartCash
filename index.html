<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cash – Controle Financeiro</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js">
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <header>
        <h1>Smart Cash</h1>
    </header>

    <main class="container">

        <!-- DASHBOARD -->
        <section class="dashboard">
            <div class="card">
                <h3>Entradas</h3>
                <span id="totalEntradas">R$ 0,00</span>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <span id="totalSaidas">R$ 0,00</span>
            </div>
            <div class="card">
                <h3>Saldo</h3>
                <span id="saldoAtual">R$ 0,00</span>
            </div>
            <div class="card">
                <h3>Maior Gasto</h3>
                <span id="maiorCategoria">-</span>
            </div>
        </section>

        <!-- FORMULÁRIO -->
        <section class="form-section">
            <h2>Nova Movimentação</h2>
            <form id="formMovimento">
                <input type="text" id="descricao" placeholder="Descrição" required>
                <input type="number" id="valor" placeholder="Valor" required>
                <select id="tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
                <select id="categoria">
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Moradia</option>
                    <option>Lazer</option>
                    <option>Outros</option>
                </select>
                <input type="date" id="data" required>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <!-- FILTROS -->
        <section class="filtros">
            <input type="text" id="filtroDescricao" placeholder="Pesquisar">
            <select id="filtroCategoria">
                <option value="">Todas</option>
                <option>Alimentação</option>
                <option>Transporte</option>
                <option>Moradia</option>
                <option>Lazer</option>
                <option>Outros</option>
            </select>
        </section>

        <!-- TABELA -->
        <section class="historico">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaMovimentacoes"></tbody>
            </table>
        </section>

        <!-- GRÁFICO DE BARRAS (EVOLUÇÃO) -->
        <section class="chart-section">
            <div class="chart-header">
                <h2>📊 Evolução de Entradas e Saídas</h2>
                <div class="chart-controls">
                    <select id="periodoGrafico">
                        <option value="semanal">Semanal</option>
                        <option value="mensal">Mensal</option>
                    </select>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="graficoEvolucao"></canvas>
            </div>
        </section>

        <!-- GRÁFICOS DE ROSCA (ENTRADAS E SAÍDAS POR CATEGORIA) -->
        <section class="chart-section" style="margin-top:20px;">
            <h2 style="margin-bottom:15px;">🥧 Distribuição por Categoria</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <h3 style="text-align:center; font-size:16px; color:#22c55e;">Entradas</h3>
                    <div class="chart-wrapper" style="height:220px;">
                        <canvas id="graficoEntradasCategoria"></canvas>
                    </div>
                </div>
                <div>
                    <h3 style="text-align:center; font-size:16px; color:#ef4444;">Saídas</h3>
                    <div class="chart-wrapper" style="height:220px;">
                        <canvas id="graficoSaidasCategoria"></canvas>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

<footer>
    <p>&copy; 2026 <span id="ano"></span>SmartCash - Dashboard Financeiro - Rogerio Tadeu</p>
</footer>

</html>
